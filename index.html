<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовое задание</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header__inner">
          <img src="/img/logo.svg" alt="Логотип" title="Логотип" />
        </div>
      </div>
    </header>
    <main>
      <section class="banner">
        <div class="container">
          <div class="banner-content">
            <h1 class="banner-content__title">
              <span>Превратите </span>
              <span>уездный город</span>
              <span class="banner-content__title--center">в столицу</span>
              <span class="banner-content__title--right">земного шара</span>
            </h1>
            <p class="banner-content__text">
              <span>Оплатите взнос на телеграммы для организации</span>
              <span>Международного васюкинского турнира по шахматам</span>
            </p>
            <div class="banner-content__btns">
              <a href="#">Поддержать шахматную мысль</a>
              <a href="#">Подробнее о турнире</a>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
